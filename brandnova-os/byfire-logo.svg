<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 176 240" role="img" aria-labelledby="title desc">
  <title id="title">Byfire logo</title>
  <desc id="desc">Gradient flame and B shaped logo mark.</desc>
  <defs>
