<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>营销实战课团队总结 | 经验文档</title>
<meta name="description" content="营销实战课团队总结 PDF 经验文档，沉淀 GEO 与营销实战课程的团队复盘内容。">
<style>
  * { box-sizing: border-box; }

  :root {
    --bg: #f3f5f0;
    --paper: #fffdf7;
    --ink: #162018;
    --muted: #5d695f;
    --line: #d6dbc9;
    --green: #1f7a4a;
    --green-dark: #105436;
    --gold: #b8841f;
    --white: #ffffff;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--ink);
    font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  a { color: inherit; }

  .shell {
    width: min(1180px, calc(100% - 32px));
    margin: 24px auto 36px;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
  }

  .home-link,
  .open-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
    color: var(--green-dark);
    font-size: 13px;
    font-weight: 800;
    text-decoration: none;
  }

  .open-link {
    background: var(--green);
    border-color: var(--green);
    color: var(--white);
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 22px;
    align-items: end;
    padding: 30px 34px;
    border: 1px solid var(--line);
    border-radius: 14px 14px 0 0;
    background: var(--paper);
  }

  .eyebrow {
    margin: 0 0 10px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 1.4px;
    text-transform: uppercase;
  }

  h1 {
    margin: 0;
    font-size: clamp(30px, 4.5vw, 54px);
    line-height: 1.05;
    letter-spacing: 0;
  }

  .summary {
    max-width: 720px;
    margin: 16px 0 0;
    color: var(--muted);
    font-size: 15px;
    line-height: 1.8;
  }

  .meta {
    display: grid;
    gap: 8px;
    min-width: 210px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .meta strong {
    display: block;
    color: var(--ink);
    font-size: 12px;
    letter-spacing: .8px;
    text-transform: uppercase;
  }

  .viewer-wrap {
    border: 1px solid var(--line);
    border-top: 0;
    background: var(--white);
    min-height: 72vh;
  }

  .pdf-viewer {
    display: block;
    width: 100%;
    min-height: 78vh;
    border: 0;
    background: var(--white);
  }

  .fallback {
    padding: 34px;
    color: var(--muted);
  }

  @media (max-width: 760px) {
    .shell { width: min(100% - 20px, 1180px); margin-top: 14px; }
    .topbar,
    .hero { grid-template-columns: 1fr; }
    .topbar { align-items: stretch; }
    .home-link,
    .open-link { width: 100%; }
    .hero { padding: 24px 20px; }
    .meta { min-width: 0; }
    .pdf-viewer { min-height: 72vh; }
  }
</style>
</head>
<body>
<main class="shell">
  <div class="topbar">
    <a class="home-link" href="../">← Back to Home</a>
    <a class="open-link" href="../assets/marketing-practice-team-summary.pdf" target="_blank" rel="noreferrer">打开 PDF</a>
  </div>

  <section class="hero">
    <div>
      <p class="eyebrow">Experience Document · GEO Marketing</p>
      <h1>营销实战课<br>团队总结</h1>
      <p class="summary">围绕 GEO 与营销实战课程的团队复盘材料，沉淀课程推进、实战观察、团队协作与后续优化方向。</p>
    </div>
    <div class="meta">
      <div><strong>Format</strong>PDF</div>
      <div><strong>Source</strong>Byfire AI / GEO</div>
      <div><strong>Asset</strong>marketing-practice-team-summary.pdf</div>
    </div>
  </section>

  <section class="viewer-wrap">
    <object class="pdf-viewer" data="../assets/marketing-practice-team-summary.pdf" type="application/pdf">
      <div class="fallback">
        当前浏览器无法内嵌显示 PDF。<a href="../assets/marketing-practice-team-summary.pdf">打开原始文件</a>
      </div>
    </object>
  </section>
</main>
</body>
</html>
